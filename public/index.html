<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国旗パズル</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 id="stage-title">国旗パズル</h1>
  
  <!-- ステージ選択ボタン -->
  <div id="stage-selector">
    <button onclick="loadStage('japan')">日本 (2:3)</button>
    <button onclick="loadStage('switzerland')">スイス (1:1)</button>
    <button onclick="loadStage('nepal')">ネパール (特殊)</button>
  </div>

  <p>パーツを黒枠の中に正しく配置しよう！</p>

  <!-- 目的地（国旗ごとのサイズに合わせて可変） -->
  <div id="target-area"></div>

  <!-- パーツ置き場 -->
  <div id="piece-container"></div>

  <!-- game.js から client.js に変更 -->
  <script src="client.js"></script>
</body>
</html>
