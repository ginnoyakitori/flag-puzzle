<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国旗パズル</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 id="stage-title">国旗パズル</h1>
  
  <!-- ステージ選択ボタン -->
  <div id="stage-selector">
    <button onclick="loadStage('japan')">日本 (2:3)</button>
    <button onclick="loadStage('switzerland')">スイス (1:1)</button>
    <button onclick="loadStage('nepal')">ネパール (特殊)</button>
  </div>

  <p>下のリストからパーツを選んで、黒枠の中に正しく配置しよう！</p>

  <!-- プレイフィールド（黒枠の周り・外側にもパーツを置けるキャンバスエリア） -->
  <div id="game-canvas">
    <!-- 目的地（黒枠エリア） -->
    <div id="target-area"></div>
  </div>

  <!-- 下部：スクロール可能なパーツ置き場 -->
  <div id="piece-tray-wrapper">
    <div id="piece-tray"></div>
  </div>

  <script src="client.js"></script>
</body>
</html>
